name: fluent_voice
description: "A premium Flutter application based on Figma design."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1 # As preferred by user for state management
  google_fonts: ^6.1.0 # For Inter font
  supabase_flutter: ^2.4.0
  flutter_dotenv: ^5.1.0
  image_picker: ^1.2.2
  cached_network_image: ^3.4.1
  http: ^1.6.0
  record: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
